# Proxy-model detector. Sits IN FRONT of your existing site via a route; does not
# serve pages and does not take over the hostname. Your static worker keeps serving
# the pages on its custom domain; your other workers keep their (more-specific) routes.
name = "viseoncrawltest-listener"   # MUST match your existing worker's name
main = "src/index.js"
compatibility_date = "2025-06-01"

# A broad route on the zone. Per Cloudflare precedence: this route beats the static
# worker's custom domain (so the detector runs in front and proxies to it), while your
# OTHER workers' MORE-SPECIFIC routes (e.g. viseoncrawltest.uk/api/*) beat THIS one
# (so they're untouched). The detector only handles paths no other route claims.
routes = [
  { pattern = "viseoncrawltest.uk/*", zone_name = "viseoncrawltest.uk" }
]

[triggers]
crons = ["*/2 * * * *"]   # fast while seeding; switch to "0 * * * *" once done

# Durable Object coordinator (already created under tag v1 on this worker — keep as-is).
[durable_objects]
bindings = [
  { name = "SCHEMA_DO", class_name = "SchemaCoordinator" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SchemaCoordinator"]

[vars]
ENDPOINT_URL = "https://sggvx2wk8k.execute-api.eu-west-1.amazonaws.com/dev/enqueue-singlepage"
AWS_REGION = "eu-west-1"
S3_BUCKET = "funnyseo"
S3_KEY = "ecs/viseoncrawltest"
S3_PAGES_KEY = "ecs/viseoncrawltest/pages"
S3_DOMAIN_KEY = "ecs/viseoncrawltest"
S3_URLS_KEY = "ecs/viseoncrawltest/all_urls.json"
NOTIFY_EMAIL = ""
ENQUEUE_NEW_PAGES = "false"

# Secrets (set in dashboard / `wrangler secret put`, NOT here):
#   API_KEY, AWS_ACCESS_KEY, AWS_SECRET_KEY,
#   QLIK_AUTOMATION, QLIK_TENANT, QLIK_BEARER, WORKER_AUTH
